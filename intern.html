// 2. تدمير كاش المتصفح محلياً ومنع سهم الرجوع (Back Button) من قراءة الجلسة المنتهية
window.onload = function () {
    // 1️⃣ أولاً: جلب بيانات الطالب الحالي وتحديث الـ Navbar ديناميكياً
    const userData = localStorage.getItem('user');

    if (userData) {
        const user = JSON.parse(userData);

        // استخراج الاسم الكامل القادم من قاعدة البيانات (سواء الحقل Name أو name)
        const fullName = user.Name || user.name || `${user.FirstName || user.firstName || ''} ${user.LastName || user.lastName || ''}`.trim() || "Student";
        
        // تحديث اسم الطالب في أعلى اليمين
        const navNameEl = document.getElementById('userName');
        if (navNameEl) {
            navNameEl.textContent = fullName; 
        }

        // توليد اختصار الحساب وتحديث الدائرة (مثال: aymen ouk تصبح AO)
        const navAvatarEl = document.getElementById('userAvatar');
        if (navAvatarEl && fullName) {
            const nameParts = fullName.split(' ');
            let initials = '';
            if (nameParts.length > 0 && nameParts[0]) initials += nameParts[0][0]; // الحرف الأول من الاسم
            if (nameParts.length > 1 && nameParts[1]) initials += nameParts[1][0]; // الحرف الأول من اللقب
            
            navAvatarEl.textContent = initials.toUpperCase(); // طباعة الاختصار الجديد في الدائرة
        }
    }

    // 2️⃣ ثانياً: كود حماية الكاش وزر الرجوع (الذي كان لديك سابقاً)
    if (window.performance && window.performance.navigation.type === 2) {
        if (!localStorage.getItem('user')) {
            window.location.replace('login.html');
        } else {
            window.location.reload(); 
        }
    }
}

                async withdrawApplication(appId) {
                    const app = applications.find(a => a.id === appId);
                    if (!app) throw new Error('Application not found');
                    if (app.status === 'accepted') throw new Error('Cannot withdraw an accepted application');
                    const idx = applications.findIndex(a => a.id === appId);
                    if (idx !== -1) {
                        applications.splice(idx, 1);
                        notifications.unshift({
                            id: Date.now(), title: 'Application Withdrawn',
                            message: `You withdrew your application for ${app.internshipTitle}`,
                            type: 'warning', time: new Date().toLocaleString(), read: false

                        return true;
                    }
                    throw new Error('Application not found');

            async function renderDashboard(container) {
                // جلب البيانات الحقيقية للمستخدم الحالي من الجلسة
                const userData = localStorage.getItem('user');
                let myAppsCount = 0;
                let availableCount = 0; // سيتم جلبها ديناميكياً من قاعدة البيانات
                let activeCount = 0;    // سيتم جلبها ديناميكياً من قاعدة البيانات
                let realApplications = []; 
                let completionRate = 0;

                // 1️⃣ أولاً: جلب عروض التربص المتاحة ديناميكياً من السيرفر لتحديث العداد الحقيقي
                try {
                    const resOffers = await fetch('http://localhost:5000/api/intern/offers', {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'user-role': 'student' // 🔒 تمرير الصلاحية للحارس
                        }
                    });
                    const dataOffers = await resOffers.json();
                    if (dataOffers.success) {
                        availableCount = dataOffers.offers ? dataOffers.offers.length : 0;
                    }
                } catch (err) {
                    console.error("Error fetching real offers count:", err);
                }

                // 2️⃣ ثانياً: جلب إحصائيات وطلبات الطالب الحقيقية من السيرفر
                if (userData) {
                    const user = JSON.parse(userData);
                    const internId = user.InternID || user.internId || user.id; 
                    
                    if (internId) {
                        try {
                            // جلب الطلبات والعدد الحقيقي
                            const resStats = await fetch(`http://localhost:5000/api/intern/stats/${internId}`, {
                                method: 'GET',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'user-role': 'student' // 🔒 تمرير الصلاحية للحارس
                                }
                            });
                            const dataStats = await resStats.json();
                            if (dataStats.success) {
                                myAppsCount = dataStats.count || 0;
                                realApplications = dataStats.applications || []; 
                            }

                            // جلب حالة التربص الحالي لمعرفة هل هو مقبول ونشط أم لا لتصفير عداد التربصات النشطة
                            const resMyIntern = await fetch(`http://localhost:5000/api/intern/my-internship/${internId}`, {
                                method: 'GET',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'user-role': 'student' // 🔒 تمرير الصلاحية للحارس
                                }
                            });
                            const dataMyIntern = await resMyIntern.json();
                            if (dataMyIntern.success && dataMyIntern.hasInternship) {
                                activeCount = 1;
                            } else {
                                activeCount = 0; // إجبار العداد على أن يصبح 0 إذا لم يكن لديه تربص مقبول
                            }
                        } catch (err) {
                            console.error("Error fetching real dashboard data:", err);
                        }
                    }
                }

                // حساب نسبة النجاح بناءً على البيانات الحقيقية المسترجعة
                if (realApplications.length > 0) {
                    const acceptedCount = realApplications.filter(a => (a.status || '').toLowerCase() === 'accepted').length;
                    completionRate = Math.floor((acceptedCount / realApplications.length) * 100);
                }

                // 3️⃣ ثالثاً: بناء واجهة لوحة التحكم بالعدادات الحقيقية والروابط الصريحة
                container.innerHTML = `
                <div class="view-container">
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-label"><i class="fas fa-rocket mr-1" style="color:#38A3FD;"></i> Available Internships</div><div class="stat-value">${availableCount}</div></div>
                        <div class="stat-card"><div class="stat-label"><i class="fas fa-paper-plane mr-1"></i> My Applications</div><div class="stat-value">${myAppsCount}</div></div>
                        <div class="stat-card"><div class="stat-label"><i class="fas fa-play-circle mr-1"></i> Active Internship</div><div class="stat-value">${activeCount}</div></div>
                        <div class="stat-card"><div class="stat-label"><i class="fas fa-check-circle mr-1"></i> Success Rate</div><div class="stat-value">${completionRate}%</div></div>
                    </div>
                    <div class="section-header"><div class="section-title"><i class="fas fa-bolt mr-2" style="color:#38A3FD;"></i>🔥 Recent Offers</div><button class="view-btn" onclick="renderView('offers')">View All <i class="fas fa-arrow-right ml-1"></i></button></div>
                    <div class="cards-grid" id="recommendedOffersContainer">
                        </div>
                    <div class="section-header"><div class="section-title"><i class="fas fa-history mr-2"></i> Recent Applications</div><button class="view-btn" onclick="renderView('applications')">View All <i class="fas fa-arrow-right ml-1"></i></button></div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Internship</th><th>Company</th><th>Applied</th><th>Status</th></tr></thead>
                            <tbody>
                                ${realApplications.slice(0, 5).map(app => `
                                    <tr>
                                        <td>${app.title || 'N/A'}</td>

window.handleWithdraw = async function(appId) {
    if (confirm('Are you sure you want to withdraw this application?')) {
        try { 
            const res = await fetch(`http://localhost:5000/api/intern/withdraw/${appId}`, {
                method: 'DELETE',
                headers: {

                    'user-role': 'student' // 🔒 إثبات الهوية للحارس للسماح بحذف أو سحب الطلب بأمان
                }
            });
            const data = await res.json();

            if (data.success) {

            window.toggleNotifications = function() {
                document.getElementById('notificationDropdown').classList.toggle('show');
                renderNotificationDropdown();
            };
            function renderNotificationDropdown() {
                const list = document.getElementById('notificationList');
                const unread = notifications.filter(n=>!n.read).slice(0,5);
                if (!unread.length) { list.innerHTML='<div style="padding:24px;text-align:center;color:#64748b;">No new notifications</div>'; return; }
                list.innerHTML = unread.map(n=>`<div class="notification-item unread" onclick="markNotificationRead(${n.id}); toggleNotifications();"><div class="notification-icon">${n.type==='success'?'✅':n.type==='warning'?'⚠️':'📢'}</div><div class="notification-content"><div class="notification-title">${n.title}</div><div style="font-size:12px;color:#4B5563;">${n.message}</div><div class="notification-time">${n.time}</div></div></div>`).join('');
            }
            function updateNotificationBadge() {
                const badge = document.getElementById('notificationCount');
                const unread = notifications.filter(n=>!n.read).length;
                badge.textContent = unread;
                badge.style.display = unread>0?'flex':'none';
            }
            window.logout = function() { 
                if (confirm('Are you sure you want to logout?')) {
                    localStorage.removeItem('currentUser');
                    window.location.href='homepage.html';
                }
            };

            function initUser() {
                const saved = JSON.parse(localStorage.getItem('currentUser'));
                if (saved && saved.role === 'student') {
                    currentUser = saved;
                    let students = JSON.parse(localStorage.getItem('registeredStudents')) || [];
                    let fullData = students.find(s => s.id === currentUser.id);
                    if (fullData) {
                        currentUser.department = fullData.specialization || currentUser.department;
                        currentUser.phone = fullData.phone || currentUser.phone;
                    }
                }
                document.getElementById('userName').textContent = currentUser.name;
                document.getElementById('userAvatar').textContent = currentUser.name.split(' ').map(w=>w[0]).join('').toUpperCase();
            }

            document.addEventListener('click', e => {
                const container = document.querySelector('.notification-container');
                const dropdown = document.getElementById('notificationDropdown');
                if (container && !container.contains(e.target) && dropdown.classList.contains('show')) dropdown.classList.remove('show');
            });
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', () => { const view = item.dataset.view; if (view) renderView(view); });
            });

            initUser();
            updateNotificationBadge();
            renderView('dashboard');
        })();

    window.handleApply = async function(id) {
        const userData = localStorage.getItem('user');
        if (!userData) {
            alert("Please login first!");
            return;
        }
        const user = JSON.parse(userData);
        
        // اصطياد المعرف بكافة الأشكال لضمان الحساب الجديد
        const internId = user.InternID || user.internId || user.id || user.studentId; 

        if (!confirm('Are you sure you want to apply for this internship?')) return;

        try { 
            const res = await fetch('http://localhost:5000/api/intern/apply', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'user-role': 'student' 
                },
                body: JSON.stringify({ internId: parseInt(internId), internshipId: parseInt(id) })
            });
            
            const data = await res.json();

            if (data.success) {
                alert('🎉 Application submitted successfully!'); 
                
                try {
                    if (typeof updateNotificationBadge === 'function') updateNotificationBadge(); 
                } catch(e) { console.log("Notification badge update skipped"); }

                window.location.reload();
                
            } else {
                alert('Failed to submit application: ' + data.message);
            }
        } catch(e) { 
            console.error("🚨 خطأ في طلبات التحديث التابعة للواجهة:", e);
            alert('An error occurred while refreshing dashboard data.'); 
        }
    };

    // 🎯 الخطوة 5 مدمجة هنا: دالة التوقيع الرقمي والمصادقة على الاتفاقية من طرف الطالب
    window.confirmAgreementSignature = async function() {
        // 1. قراءة بيانات الجلسة الحالية للطالب
        const userData = localStorage.getItem('user') || localStorage.getItem('currentUser');
        if (!userData) {
            alert("Session expirée, veuillez vous reconnecter. (انتهت الجلسة، يرجى إعادة تسجيل الدخول)");
            return;
        }
        const user = JSON.parse(userData);
        
        // طلب تأكيد رسمي من الطالب قبل إرسال التوقيع للسيرفر
        if (!confirm("Êtes-vous sûr de vouloir signer et valider cette convention de stage ? (هل أنت متأكد من توقيع هذه الاتفاقية ومصادقتها؟)")) {
            return;
        }

        // تحديد معرف التسجيل أو استخدام البريد الإلكتروني كبصمة رقمية احتياطية
        const studentIdentifier = user.RegistrationID || user.id || btoa(user.Email || user.email);

        try {
            // 2. الاتصال بـ API التوقيع في السيرفر الخلفي لمشروعك
            const response = await fetch(`http://localhost:5000/api/intern/sign-agreement/${studentIdentifier}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "user-role": "intern"
                }
            });

            const result = await response.json();

            if (result.success) {
                alert("🎉 Convention signée et validée avec succès ! (تم التوقيع الرقمي والمصادقة على الاتفاقية بنجاح)");
                
                // 3. تحديث الحالة محلياً في المتصفح لتحديث الأزرار فوراً
                user.Status = 'signed_by_student';
                localStorage.setItem('user', JSON.stringify(user));
                
                // إعادة إنعاش كامل للصفحة لتظهر التحديثات حية أمام اللجنة
                window.location.reload();
            } else {
                alert("Erreur: " + result.message);
            }
        } catch (error) {
            console.error("🚨 خطأ أثناء إرسال التوقيع الرقمي:", error);
            alert("Erreur de connexion au serveur. (فشل الاتصال بالسيرفر لتسجيل التوقيع)");
        }
    };
